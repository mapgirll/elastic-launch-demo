version: "1"
name: __SCENARIO_NAME__ Remediation Action
description: >
  Execute remediation actions for __SCENARIO_NAME__ anomalies. Extracts
  callback_url from log event_name, executes the remediation via HTTP
  callback, and logs the result to an audit index.

triggers:
  - type: manual

inputs:
  - name: error_type
    type: string
    required: true
    description: "Error type to remediate"
  - name: channel
    type: number
    required: true
    description: "Fault channel being remediated (1-20)"
  - name: action_type
    type: string
    required: true
    description: "Remediation action: restart_service, reset_pipeline, failover_service, isolate_subsystem"
  - name: target_service
    type: string
    default: ""
    description: "Service to target for restart/failover actions"
  - name: justification
    type: string
    required: true
    description: "Reason for executing this remediation"
  - name: dry_run
    type: boolean
    default: true

steps:
  - name: pre_action_snapshot
    type: elasticsearch.esql.query
    with:
      query: >
        FROM logs,logs.* | WHERE KQL("body.text: \"{{ inputs.error_type }}\" AND severity_text: \"ERROR\"") | KEEP event_name
      format: json

  - name: extract_callback
    type: data.set
    with:
      var:
        - event_meta: "${{ steps.pre_action_snapshot.output.values[1][0] | json_parse }}"

  - name: execute_remediation
    type: http
    with:
      url: "{{ steps.extract_callback.output.var[0].event_meta.callback_url }}/api/chaos/resolve"
      method: POST
      headers:
        Content-Type: application/json
      body:
        action: "{{ inputs.action_type }}"
        channel: "{{ inputs.channel }}"
        deployment_id: "{{ steps.extract_callback.output.var[0].event_meta.deployment_id }}"
        target_service: "{{ inputs.target_service }}"
        dry_run: "{{ inputs.dry_run }}"
        justification: "{{ inputs.justification }}"
      timeout: 120s

  - name: log_success
    type: console
    with:
      message: "Remediation SUCCESSFUL: {{ inputs.action_type }} executed on channel {{ inputs.channel }}. Fault resolved."

  - name: audit_log
    type: elasticsearch.index
    with:
      index: "__NS__-remediation-audit"
      document:
        channel: "{{ inputs.channel }}"
        action_type: "{{ inputs.action_type }}"
        target_service: "{{ inputs.target_service }}"
        justification: "{{ inputs.justification }}"
        dry_run: "{{ inputs.dry_run }}"
        status: "resolved"
        mission_id: "__SCENARIO_NAME__"
      refresh: wait_for
